name: maintenance

# Layer M — drift detection. Runs weekly and on demand.
# Produces a PR with proposed supersedes; never mutates declared state directly.
# See layers/M-maintenance/layer.md for the full contract.

on:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    name: Detect drift and propose supersedes
    runs-on: windows-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node (for npm-published binding tools)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI (binding: hosting)
        shell: pwsh
        run: npm install -g vercel@37.0.0

      - name: Install orchestration deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e orchestration

      - name: Run layer M
        shell: pwsh
        run: |
          python -m orchestration.run layer --id M-maintenance

      - name: Open or update proposal PR
        shell: pwsh
        run: |
          $branch = "maintenance/drift-$(Get-Date -Format yyyy-MM-dd)"
          git config user.name "crank-maintenance-bot"
          git config user.email "crank-maintenance-bot@users.noreply.github.com"
          git checkout -B $branch
          git add intent/maintenance-runs bindings.yaml.proposal infrastructure/**/*.proposal 2>$null
          if ((git status --porcelain).Length -eq 0) {
            Write-Host "no drift; nothing to commit"
            exit 0
          }
          git commit -m "Maintenance: drift report"
          git push -u origin $branch --force-with-lease
          $existing = gh pr list --head $branch --json number --jq '.[0].number'
          if ($existing) {
            gh pr edit $existing --add-label "layer/scaffold"
          } else {
            gh pr create `
              --title "Maintenance: drift report $(Get-Date -Format yyyy-MM-dd)" `
              --body  "Generated by .github/workflows/maintenance.yml. See intent/maintenance-runs/." `
              --label "layer/scaffold"
          }

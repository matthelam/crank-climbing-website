# yaml-language-server: $schema=../_schemas/secrets-policy.schema.json
# Declared secrets policy. Names and locations only — values never live here.

storage:
  primary: env_local_file
  path: .env.local
  template_path: .env.local.example

secrets:
  - name: ANTHROPIC_API_KEY
    purpose: Claude Agent SDK calls from the LangGraph orchestrator
    required_for_layers:
      - "01-business-decomposition"
      - "02-brand-kit"
      - "03-ux"
      - "04-scope"
      - "05-elaboration"
      - "06-requirements"
      - "07-stories-tasks"
      - "08-red-tests"
      - "09-recursive-build"
      - "12-dual-ac-verification"
      - "13-review"
      - "M-maintenance"
    obtain_from_url: "https://console.anthropic.com/settings/keys"

  - name: VERCEL_TOKEN
    purpose: Provisioning the Vercel project and reading deployment state
    required_for_layers:
      - "00-bootstrap"
      - "11-pull-request"
      - "14-merge-deploy-observe"
      - "M-maintenance"
    obtain_from_url: "https://vercel.com/account/tokens"

  - name: GITHUB_TOKEN
    purpose: Repo provisioning, label sync, branch protection (gh auth supplies if absent)
    required_for_layers:
      - "00-bootstrap"
      - "11-pull-request"
      - "14-merge-deploy-observe"
      - "M-maintenance"
    obtain_from_url: "https://github.com/settings/tokens"
